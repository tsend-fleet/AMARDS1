<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#041a3f">

  <!-- Anti-FOUC theme bootstrap (BEFORE Tailwind) -->
  <script>
    (function(){
      var m = localStorage.getItem('delta_theme_mode') || 'light';
      if (m === 'auto') m = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.classList.add(m === 'light' ? 'light' : 'dark');
    })();
  </script>

  <title>Panhandle 24/7 Roadside | 24/7 Roadside Assistance & Mobile Mechanic Amarillo TX — (806) 555-0140</title>
  <meta name="description" content="Stranded on I-40 or stuck in Amarillo? Panhandle 24/7 Roadside delivers 24/7 roadside assistance, mobile mechanic, semi truck repair, towing, jump starts, lockouts, fuel & flat tire service across the Texas Panhandle. Avg ETA 22 min. Call (806) 555-0140.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            manrope: ['Manrope','system-ui','sans-serif'],
            inter:   ['Inter','system-ui','sans-serif']
          },
          colors: {
            'background':                'var(--c-bg)',
            'on-background':             'var(--c-text)',
            'surface-container':         'var(--c-surface)',
            'surface-container-low':     'var(--c-surface-alt)',
            'surface-container-lowest':  'var(--c-surface-deep)',
            'surface-container-high':    'var(--c-surface-emphasis)',
            'on-surface-variant':        'var(--c-text-muted)',
            'outline':                   'var(--c-border)',
            'tertiary':                  'var(--c-accent)',
            'tertiary-dim':              'var(--c-accent)',
            'on-tertiary-fixed':         '#231b00',
            'on-primary-container':      'rgba(225,6,0,0.1)',
            'cta':                       'var(--c-cta)',
            'cta-hover':                 'var(--c-cta-hover)',
            'header-bg':                 'var(--c-header-bg)'
          }
        }
      }
    };
  </script>

  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--c-bg); color: var(--c-text); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 500; vertical-align: middle; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .btn-magnetic { will-change: transform; }
    [data-aos] { will-change: transform, opacity; }
  </style>

  <!-- JSON-LD: injected at runtime by delta-engine.js (see delta-jsonld + delta-faq-jsonld) -->
</head>
<body data-delta-app="public" class="bg-background text-on-background">

  <!-- Header -->
  <header class="sticky top-0 z-[100] bg-surface-container/95 backdrop-blur border-b border-outline/20">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
      <a href="/" class="flex items-center gap-2 font-manrope font-black text-lg text-on-background">
        <span class="material-symbols-outlined text-cta">emergency</span>
        <span data-delta="brand">Panhandle 24/7 Roadside</span>
      </a>
      <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-on-surface-variant">
        <a href="#services" class="hover:text-cta">Services</a>
        <a href="page.html?id=service-area" class="hover:text-cta">Service Area</a>
        <a href="page.html?id=pricing" class="hover:text-cta">Pricing</a>
        <a href="page.html?id=fleet" class="hover:text-cta">Fleet</a>
        <a href="#reviews" class="hover:text-cta">Reviews</a>
        <a href="page.html?id=contact" class="hover:text-cta">Contact</a>
      </nav>
      <div class="flex items-center gap-2">
        <button data-delta-trigger="theme-toggle" aria-label="Toggle theme" class="hidden md:inline-flex h-10 w-10 items-center justify-center rounded hover:bg-surface-container-high">
          <span class="material-symbols-outlined">light_mode</span>
        </button>
        <a data-delta-trigger="call" href="tel:+18065550140" class="hidden md:inline-flex items-center gap-2 bg-cta hover:bg-cta-hover text-white font-bold px-4 h-10 rounded transition-colors text-sm">
          <span class="material-symbols-outlined">call</span>
          <span data-delta="phoneDisplay">(806) 555-0140</span>
        </a>
        <button data-delta-trigger="mobile-nav" aria-label="Open menu" class="md:hidden h-10 w-10 inline-flex items-center justify-center rounded hover:bg-surface-container-high">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile drawer -->
  <aside data-delta-target="mobile-nav" class="md:hidden fixed top-0 right-0 h-full w-72 bg-surface-container z-[200] translate-x-full transition-transform duration-300 shadow-2xl">
    <div class="p-6 flex flex-col gap-3 text-on-background">
      <button data-delta-trigger="mobile-nav" aria-label="Close menu" class="self-end h-10 w-10 inline-flex items-center justify-center rounded hover:bg-surface-container-high">
        <span class="material-symbols-outlined">close</span>
      </button>
      <a href="#services" class="py-3 border-b border-outline/20">Services</a>
      <a href="page.html?id=service-area" class="py-3 border-b border-outline/20">Service Area</a>
      <a href="page.html?id=pricing" class="py-3 border-b border-outline/20">Pricing</a>
      <a href="page.html?id=fleet" class="py-3 border-b border-outline/20">Fleet</a>
      <a href="#reviews" class="py-3 border-b border-outline/20">Reviews</a>
      <a href="page.html?id=contact" class="py-3 border-b border-outline/20">Contact</a>
      <button data-delta-trigger="theme-toggle" class="py-3 border-b border-outline/20 flex items-center gap-2">
        <span class="material-symbols-outlined">light_mode</span>Toggle Theme
      </button>
      <a data-delta-trigger="call" href="tel:+18065550140" class="mt-4 inline-flex items-center justify-center gap-2 bg-cta text-white font-bold py-3 rounded">
        <span class="material-symbols-outlined">call</span><span data-delta="phoneDisplay">(806) 555-0140</span>
      </a>
    </div>
  </aside>

  <!-- Page renders here -->
  <main id="delta-root"></main>

  <!-- Sticky Mobile CTA Bar (MANDATORY) -->
  <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex items-stretch justify-around bg-header-bg border-t-4 shadow-[0_-4px_12px_rgba(0,0,0,0.4)] h-20"
       style="border-top-color: var(--c-accent)" aria-label="Emergency dispatch actions">
    <a data-delta-trigger="call" href="tel:+18065550140" aria-label="Call us"
       class="flex flex-col items-center justify-center bg-cta text-white w-full h-full font-bold text-xs uppercase tracking-wider hover:bg-cta-hover transition-colors">
      <span class="material-symbols-outlined mb-1">call</span>CALL
    </a>
    <a data-delta-trigger="text" href="sms:+18065550140" aria-label="Text us"
       class="flex flex-col items-center justify-center text-white w-full h-full font-bold text-xs uppercase tracking-wider hover:bg-cta">
      <span class="material-symbols-outlined mb-1">chat</span>TEXT
    </a>
    <button data-delta-trigger="location" aria-label="Share location"
       class="flex flex-col items-center justify-center text-white w-full h-full font-bold text-xs uppercase tracking-wider hover:bg-cta">
      <span class="material-symbols-outlined mb-1">location_on</span>LOCATION
    </button>
  </nav>

  <!-- Scripts: GSAP → ScrollTrigger → AOS → engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="delta-engine.js"></script>
</body>
</html>
